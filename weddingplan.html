<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiahao & Yi Fang — Private Page</title>
    <link rel="icon" type="image/png"
        href="https://static.wikia.nocookie.net/maplestory/images/7/7d/Eqp_Eternal_Wedding_Ring.png/revision/latest?cb=20210508164008">

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

        :root {
            --white: #ffffff;
            --off-white: #fafaf8;
            --warm-grey: #f5f4f0;
            --text: #2c2c2c;
            --text-light: #777;
            --text-muted: #aaa;
            --accent: #d4956a;
            --accent-soft: #e8c4a8;
            --border: #ebe9e4;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Inter', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--sans);
            background: var(--off-white);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== PASSWORD CARD ===== */
        .password-page {
            width: 100%;
            max-width: 420px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease 0.2s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 48px 40px 40px;
            position: relative;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
        }

        /* Corner frame accents */
        .password-card::before,
        .password-card::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: var(--accent-soft);
            border-style: solid;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.8s forwards;
        }

        .password-card::before {
            top: -1px;
            left: -1px;
            border-width: 1px 0 0 1px;
        }

        .password-card::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 1px 1px 0;
        }

        .card-corners {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .card-corners::before,
        .card-corners::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: var(--accent-soft);
            border-style: solid;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.8s forwards;
        }

        .card-corners::before {
            top: -1px;
            right: -1px;
            border-width: 1px 1px 0 0;
        }

        .card-corners::after {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 1px 1px;
        }

        /* Card label */
        .card-label {
            font-family: var(--sans);
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-align: center;
            margin-bottom: 12px;
        }

        /* Card title */
        .card-title {
            font-family: var(--serif);
            font-weight: 300;
            font-size: 1.8rem;
            color: var(--text);
            text-align: center;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .card-title .ampersand {
            font-style: italic;
            color: var(--accent);
            font-weight: 300;
        }

        /* Divider */
        .card-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 24px;
        }

        .divider-line {
            width: 50px;
            height: 1px;
            background: var(--accent-soft);
        }

        .divider-diamond {
            width: 5px;
            height: 5px;
            background: var(--accent-soft);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* Subtitle */
        .card-subtitle {
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 300;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        /* Password field */
        .field-group {
            position: relative;
            margin-bottom: 24px;
        }

        .field-group input {
            width: 100%;
            padding: 14px 44px 14px 0;
            border: none;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            font-family: var(--sans);
            font-weight: 300;
            background: transparent;
            color: var(--text);
            border-radius: 0;
            transition: border-color 0.3s;
            outline: none;
        }

        .field-group input:focus {
            border-bottom-color: var(--accent);
            box-shadow: 0 2px 8px rgba(212, 149, 106, 0.15);
        }

        .field-group input::placeholder {
            color: #d0d0d0;
            font-weight: 300;
        }

        .field-group label {
            position: absolute;
            top: 14px;
            left: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 300;
            pointer-events: none;
            transition: all 0.25s ease;
        }

        .field-group input:focus ~ label,
        .field-group input:not(:placeholder-shown) ~ label {
            top: -10px;
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        /* Eye toggle */
        .toggle-password {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        .toggle-password svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: background 0.3s, transform 0.15s, box-shadow 0.3s;
        }

        .submit-btn:hover {
            background: #1a1a1a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Error message */
        .error-msg {
            text-align: center;
            font-size: 0.78rem;
            color: #c0564f;
            margin-top: 16px;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .error-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Shake animation on wrong password */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .password-card.shake {
            animation: shake 0.4s ease;
        }

        /* Loading spinner */
        .spinner-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--off-white);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .spinner-overlay.active {
            display: flex;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .password-card {
                padding: 36px 28px 32px;
            }

            .card-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

    <script>
        // ===== CRYPTO ENGINE (StaticCrypt compatible) =====
        const cryptoEngine = (function () {
            const { subtle } = crypto;
            const IV_BITS = 16 * 8;
            const HEX_BITS = 4;
            const ENCRYPTION_ALGO = "AES-CBC";

            const HexEncoder = {
                parse: function (hexString) {
                    if (hexString.length % 2 !== 0) throw "Invalid hexString";
                    const arr = new Uint8Array(hexString.length / 2);
                    for (let i = 0; i < hexString.length; i += 2) {
                        const v = parseInt(hexString.substring(i, i + 2), 16);
                        if (isNaN(v)) throw "Invalid hexString";
                        arr[i / 2] = v;
                    }
                    return arr;
                },
                stringify: function (bytes) {
                    const hex = [];
                    for (let i = 0; i < bytes.length; ++i) {
                        let s = bytes[i].toString(16);
                        if (s.length < 2) s = "0" + s;
                        hex.push(s);
                    }
                    return hex.join("");
                }
            };

            const UTF8Encoder = {
                parse: function (str) { return new TextEncoder().encode(str); },
                stringify: function (bytes) { return new TextDecoder().decode(bytes); }
            };

            async function decrypt(encryptedMsg, hashedPassword) {
                const ivLength = IV_BITS / HEX_BITS;
                const iv = HexEncoder.parse(encryptedMsg.substring(0, ivLength));
                const encrypted = encryptedMsg.substring(ivLength);
                const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), ENCRYPTION_ALGO, false, ["decrypt"]);
                const outBuffer = await subtle.decrypt({ name: ENCRYPTION_ALGO, iv: iv }, key, HexEncoder.parse(encrypted));
                return UTF8Encoder.stringify(new Uint8Array(outBuffer));
            }

            async function pbkdf2(password, salt, iterations, hashAlgorithm) {
                const key = await subtle.importKey("raw", UTF8Encoder.parse(password), "PBKDF2", false, ["deriveBits"]);
                const keyBytes = await subtle.deriveBits({ name: "PBKDF2", hash: hashAlgorithm, iterations, salt: UTF8Encoder.parse(salt) }, key, 256);
                return HexEncoder.stringify(new Uint8Array(keyBytes));
            }

            async function hashPassword(password, salt) {
                let hashed = await pbkdf2(password, salt, 1000, "SHA-1");
                hashed = await pbkdf2(hashed, salt, 14000, "SHA-256");
                return pbkdf2(hashed, salt, 585000, "SHA-256");
            }

            async function signMessage(hashedPassword, message) {
                const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
                const signature = await subtle.sign("HMAC", key, UTF8Encoder.parse(message));
                return HexEncoder.stringify(new Uint8Array(signature));
            }

            return { decrypt, hashPassword, signMessage, HexEncoder };
        })();
